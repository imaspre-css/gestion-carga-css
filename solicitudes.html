<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitudes — CSS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }
.header { background: #1a1a2e; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
.header h1 { font-size: 1rem; font-weight: 500; }
.nav { display: flex; gap: 4px; }
.nav a { color: #9090b0; font-size: 13px; padding: 4px 12px; border-radius: 20px; text-decoration: none; transition: all 0.15s; }
.nav a:hover, .nav a.active { color: #fff; background: rgba(255,255,255,0.1); }
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.stat-box { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 10px; padding: 1rem; }
.stat-num { font-size: 1.8rem; font-weight: 500; color: #1a1a2e; }
.stat-label { font-size: 0.72rem; color: #aaa; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-warn .stat-num { color: #854f0b; }
.card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.card-title { font-size: 0.75rem; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.07em; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 0.5px solid #d0d0c8; background: #fff; color: #1a1a1a; transition: all 0.15s; text-decoration: none; }
.btn:hover { background: #f5f5f0; }
.btn-primary { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.btn-primary:hover { background: #2a2a4e; }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filters select { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid #d0d0c8; background: #fff; cursor: pointer; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { background: #f5f5f0; padding: 0.55rem 0.75rem; text-align: left; font-weight: 500; color: #888; border-bottom: 0.5px solid #e0e0d8; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
td { padding: 0.65rem 0.75rem; border-bottom: 0.5px solid #f0f0e8; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf8; }
.tag { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.tag-pendiente { background: #faeeda; color: #854f0b; }
.tag-asignada { background: #e1f5ee; color: #0f6e56; }
.tag-rechazada { background: #fcebeb; color: #a32d2d; }
.tag-urgente { background: #fcebeb; color: #a32d2d; }
.tag-alta { background: #e6f1fb; color: #185fa5; }
.tag-media { background: #f5f5f0; color: #666; }
.pct { font-weight: 500; }
.pct-ok { color: #0f6e56; }
.pct-warn { color: #854f0b; }
.pct-over { color: #a32d2d; }
.empty { text-align: center; padding: 3rem; color: #bbb; font-size: 0.875rem; }
.spinner { width: 24px; height: 24px; border: 2.5px solid #eeeefa; border-top-color: #4a4a8a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.75rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 2rem; color: #aaa; font-size: 0.875rem; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 14px; width: 92%; max-width: 680px; max-height: 88vh; overflow-y: auto; }
.modal-head { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid #e8e8e0; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; }
.modal-head h3 { font-size: 1rem; font-weight: 500; }
.modal-body { padding: 1.5rem; }
.close-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #aaa; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.detail-item label { font-size: 0.72rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 3px; }
.detail-item span { font-size: 0.875rem; color: #1a1a1a; font-weight: 500; }
.tech-list { display: flex; flex-direction: column; gap: 8px; }
.tech-option { display: flex; align-items: center; gap: 10px; padding: 0.75rem; border: 0.5px solid #e8e8e0; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
.tech-option:hover { border-color: #4a4a8a; background: #f8f8fe; }
.tech-option.selected { border-color: #4a4a8a; background: #eeeefa; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #eeeefa; color: #4a4a8a; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 500; flex-shrink: 0; }
.tech-info { flex: 1; }
.tech-name { font-size: 0.875rem; font-weight: 500; }
.tech-meta { font-size: 0.72rem; color: #aaa; margin-top: 1px; }
.bar-bg { height: 5px; background: #f0f0e8; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: #1d9e75; }
.bar-over { background: #e24b4a !important; }
@media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr 1fr; } .detail-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>📋 Gestión de carga CSS</h1>
    <div class="nav">
    <a href="index.html">Inicio</a>
    <a href="solicitudes.html" class="active">Solicitudes</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="tecnicos.html">Técnicos</a>
    <a href="nueva-solicitud.html">+ Nueva solicitud</a>
  </div>
</div>

<div class="container">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-box"><div class="spinner" style="margin-top:0.5rem;"></div></div>
    <div class="stat-box"></div><div class="stat-box"></div><div class="stat-box"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Solicitudes de obra</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <div class="filters">
          <select id="filtroEstado" onchange="renderTabla()">
            <option value="">Todos los estados</option>
            <option value="PENDIENTE">Pendientes</option>
            <option value="ASIGNADA">Asignadas</option>
            <option value="RECHAZADA">Rechazadas</option>
          </select>
          <select id="filtroPrioridad" onchange="renderTabla()">
            <option value="">Todas las prioridades</option>
            <option value="URGENTE">Urgente</option>
            <option value="ALTA">Alta</option>
            <option value="MEDIA">Media</option>
          </select>
        </div>
        <a href="nueva-solicitud.html" class="btn btn-primary btn-sm">+ Nueva solicitud</a>
      </div>
    </div>
    <div id="tablaWrap">
      <div class="loading"><div class="spinner"></div>Cargando solicitudes...</div>
    </div>
  </div>
</div>

<!-- Modal asignación -->
<div class="modal-bg" id="modalAsignar">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Asignar técnico</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://niwnyoxsesbesotumolm.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pd255b3hzZXNiZXNvdHVtb2xtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NzQ4NzAsImV4cCI6MjA5NjA1MDg3MH0.ScugENQtfGYuo5ZZKAuXhqOZLzOvLwEQXlr55XpMT5s';

var solicitudes = [], obras = [], tecnicoSeleccionado = null, solicitudActual = null;

async function fetchAll() {
  const [s, o] = await Promise.all([
    fetch(SUPABASE_URL + '/rest/v1/solicitudes?select=*&order=created_at.desc', {
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
    }).then(r => r.json()),
    fetch(SUPABASE_URL + '/rest/v1/obras?select=*&limit=500', {
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
    }).then(r => r.json())
  ]);
  solicitudes = Array.isArray(s) ? s : [];
  obras = Array.isArray(o) ? o : [];
}

function renderStats() {
  const pendientes = solicitudes.filter(s => s.estado === 'PENDIENTE').length;
  const urgentes = solicitudes.filter(s => s.estado === 'PENDIENTE' && s.prioridad === 'URGENTE').length;
  const asignadas = solicitudes.filter(s => s.estado === 'ASIGNADA').length;
  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-box' + (pendientes ? '' : '') + '"><div class="stat-num">' + pendientes + '</div><div class="stat-label">Pendientes</div></div>' +
    '<div class="stat-box' + (urgentes ? ' stat-warn' : '') + '"><div class="stat-num">' + urgentes + '</div><div class="stat-label">Urgentes</div></div>' +
    '<div class="stat-box"><div class="stat-num">' + asignadas + '</div><div class="stat-label">Asignadas</div></div>' +
    '<div class="stat-box"><div class="stat-num">' + solicitudes.length + '</div><div class="stat-label">Total</div></div>';
}

function renderTabla() {
  const filtroE = document.getElementById('filtroEstado').value;
  const filtroP = document.getElementById('filtroPrioridad').value;
  const filtered = solicitudes.filter(s =>
    (!filtroE || s.estado === filtroE) &&
    (!filtroP || s.prioridad === filtroP)
  );

  if (!filtered.length) {
    document.getElementById('tablaWrap').innerHTML = '<div class="empty">No hay solicitudes con estos filtros</div>';
    return;
  }

  let html = '<div style="overflow-x:auto;"><table><thead><tr>'
    + '<th>Obra</th><th>Contrato</th><th>Territorio</th><th>Prioridad</th>'
    + '<th>Carga teórica</th><th>Estado</th><th>Técnico</th><th>Fecha</th><th></th>'
    + '</tr></thead><tbody>';

  filtered.forEach(s => {
    const pct = s.carga_teorica_calculada;
    const pctClass = pct > 90 ? 'pct-over' : pct > 70 ? 'pct-warn' : 'pct-ok';
    const fecha = s.created_at ? new Date(s.created_at).toLocaleDateString('es-ES') : '—';
    html += '<tr>'
      + '<td><div style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (s.denominacion||'—') + '</div>'
      + '<div style="font-size:0.72rem;color:#aaa;">' + (s.cliente||s.cod_contrato||'') + '</div></td>'
      + '<td style="font-size:0.78rem;color:#4a4a8a;">' + (s.cod_contrato||'—') + '</td>'
      + '<td style="font-size:0.78rem;color:#888;">' + (s.territorio||'—') + '</td>'
      + '<td><span class="tag tag-' + (s.prioridad||'media').toLowerCase() + '">' + (s.prioridad||'MEDIA') + '</span></td>'
      + '<td><span class="pct ' + pctClass + '">' + (pct ? pct + '%' : '—') + '</span></td>'
      + '<td><span class="tag tag-' + s.estado.toLowerCase() + '">' + s.estado + '</span></td>'
      + '<td style="font-size:0.78rem;">' + (s.tecnico_asignado||'—') + '</td>'
      + '<td style="font-size:0.72rem;color:#bbb;white-space:nowrap;">' + fecha + '</td>'
      + '<td>'
      + (s.estado === 'PENDIENTE'
        ? '<button class="btn btn-sm btn-primary" onclick="abrirAsignar(\'' + s.id + '\')">Asignar</button>'
        : '<button class="btn btn-sm" onclick="verDetalle(\'' + s.id + '\')">Ver</button>')
      + '</td>'
      + '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById('tablaWrap').innerHTML = html;
}

function getTecnicosConCarga() {
  const tecnicos = [...new Set(obras.map(o => o.tecnico))].sort();
  return tecnicos.map(t => {
    const obrasTec = obras.filter(o => o.tecnico === t);
    const cargaTeorica = obrasTec.reduce((s, o) => s + (parseFloat(o.carga_teorica_semanal)||0), 0);
    const email = obrasTec[0]?.email || '';
    return { name: t, email, obras: obrasTec.length, cargaTeorica: Math.round(cargaTeorica) };
  });
}

function abrirAsignar(id) {
  solicitudActual = solicitudes.find(s => s.id === id);
  if (!solicitudActual) return;
  tecnicoSeleccionado = null;

  document.getElementById('modalTitle').textContent = 'Asignar técnico — ' + (solicitudActual.denominacion||'').substring(0, 40);

  const cargaNueva = solicitudActual.carga_teorica_calculada || 0;
  const tecnicos = getTecnicosConCarga();

  let html = '<div style="background:#f5f5f0;border-radius:8px;padding:0.75rem;margin-bottom:1.25rem;font-size:0.82rem;">'
    + '<div style="font-weight:500;margin-bottom:4px;">' + (solicitudActual.denominacion||'') + '</div>'
    + '<div style="color:#888;">' + (solicitudActual.cod_contrato||'') + ' · ' + (solicitudActual.territorio||'') + ' · Carga: <strong>' + (cargaNueva||'—') + '%</strong></div>'
    + '</div>';

  html += '<div class="card-title" style="margin-bottom:0.75rem;">Técnicos disponibles</div>';
  html += '<div class="tech-list" id="techList">';

  tecnicos.forEach(t => {
    const ini = t.name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('');
    const cargaFinal = t.cargaTeorica + cargaNueva;
    const isOver = cargaFinal > 100;
    const barColor = isOver ? 'bar-over' : '';
    html += '<div class="tech-option" id="opt_' + t.name.replace(/\s/g,'_') + '" onclick="seleccionarTecnico(\'' + t.name.replace(/'/g,"\\'") + '\')">'
      + '<div class="avatar">' + ini + '</div>'
      + '<div class="tech-info">'
      + '<div class="tech-name">' + t.name + '</div>'
      + '<div class="tech-meta">' + t.obras + ' obras · actual: ' + t.cargaTeorica + '% → con esta obra: <strong style="color:' + (isOver?'#a32d2d':cargaFinal>80?'#854f0b':'#0f6e56') + ';">' + cargaFinal + '%</strong></div>'
      + '<div class="bar-bg"><div class="bar-fill ' + barColor + '" style="width:' + Math.min(cargaFinal,100) + '%;"></div></div>'
      + '</div>'
      + (isOver ? '<span style="font-size:0.7rem;color:#a32d2d;">⚠️ Sobrecarga</span>' : '')
      + '</div>';
  });

  html += '</div><div style="margin-top:1.25rem;display:flex;gap:8px;justify-content:flex-end;">'
    + '<button class="btn" onclick="closeModal()">Cancelar</button>'
    + '<button class="btn btn-primary" id="btnConfirmar" onclick="confirmarAsignacion()" disabled>Confirmar asignación</button>'
    + '</div>';

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalAsignar').classList.add('open');
}

function seleccionarTecnico(nombre) {
  tecnicoSeleccionado = nombre;
  document.querySelectorAll('.tech-option').forEach(el => el.classList.remove('selected'));
  document.getElementById('opt_' + nombre.replace(/\s/g,'_'))?.classList.add('selected');
  document.getElementById('btnConfirmar').disabled = false;
}

async function confirmarAsignacion() {
  if (!tecnicoSeleccionado || !solicitudActual) return;
  const btn = document.getElementById('btnConfirmar');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const res = await fetch(SUPABASE_URL + '/rest/v1/solicitudes?id=eq.' + solicitudActual.id, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + SUPABASE_KEY,
      Prefer: 'return=minimal'
    },
    body: JSON.stringify({
      estado: 'ASIGNADA',
      tecnico_asignado: tecnicoSeleccionado,
      fecha_asignacion: new Date().toISOString()
    })
  });

  if (res.ok) {
    // Auto-create obra in obras table
    const obraPayload = {
      tecnico: tecnicoSeleccionado,
      email: obras.find(o => o.tecnico === tecnicoSeleccionado)?.email || '',
      cliente: solicitudActual.cliente || '',
      cod_contrato: solicitudActual.cod_contrato || '',
      cod_obra: 'SOL-' + solicitudActual.id.slice(0,8).toUpperCase(),
      descripcion: solicitudActual.denominacion || '',
      territorio: solicitudActual.territorio || '',
      estado: 'ACTIVA',
      fecha_inicio: solicitudActual.fecha_inicio || null,
      fecha_fin: null,
      carga_teorica_semanal: solicitudActual.carga_teorica_calculada || null
    };
    const obraRes = await fetch(SUPABASE_URL + '/rest/v1/obras', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPABASE_KEY,
        Authorization: 'Bearer ' + SUPABASE_KEY,
        Prefer: 'return=minimal'
      },
      body: JSON.stringify(obraPayload)
    });
    if (!obraRes.ok) {
      const errTxt = await obraRes.text();
      console.error('Error creando obra:', errTxt, obraPayload);
    }
    // Send notification email to delegado
    if (solicitudActual.delegado) {
      const asunto = 'Obra asignada — ' + (solicitudActual.denominacion||'');
      const cuerpo = 'Hola,\n\nTe confirmamos la asignacion de la siguiente obra:\n\n'
        + '* Obra: ' + (solicitudActual.denominacion||'') + '\n'
        + '* Contrato: ' + (solicitudActual.cod_contrato||'') + '\n'
        + '* Territorio: ' + (solicitudActual.territorio||'') + '\n'
        + '* Tecnico asignado: ' + tecnicoSeleccionado + '\n'
        + '* Carga teorica: ' + (solicitudActual.carga_teorica_calculada||'-') + '%\n\n'
        + 'Por favor contacta con el tecnico para coordinar el inicio de la obra.\n\nSaludos,\nEquipo de Staffing';
      window.open('mailto:' + encodeURIComponent(solicitudActual.delegado)
        + '?subject=' + encodeURIComponent(asunto)
        + '&body=' + encodeURIComponent(cuerpo));
    }
    closeModal();
    await init();
  } else {
    btn.disabled = false;
    btn.textContent = 'Confirmar asignación';
    alert('Error al guardar. Inténtalo de nuevo.');
  }
}

function verDetalle(id) {
  const s = solicitudes.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modalTitle').textContent = s.denominacion || 'Detalle';
  const fecha = s.created_at ? new Date(s.created_at).toLocaleDateString('es-ES') : '—';
  const fechaAsig = s.fecha_asignacion ? new Date(s.fecha_asignacion).toLocaleDateString('es-ES') : '—';
  document.getElementById('modalBody').innerHTML = '<div class="detail-grid">'
    + '<div class="detail-item"><label>Contrato</label><span>' + (s.cod_contrato||'—') + '</span></div>'
    + '<div class="detail-item"><label>Cliente</label><span>' + (s.cliente||'—') + '</span></div>'
    + '<div class="detail-item"><label>Territorio</label><span>' + (s.territorio||'—') + '</span></div>'
    + '<div class="detail-item"><label>Municipio</label><span>' + (s.municipio||'—') + '</span></div>'
    + '<div class="detail-item"><label>Inicio</label><span>' + (s.fecha_inicio||'—') + '</span></div>'
    + '<div class="detail-item"><label>Plazo</label><span>' + (s.plazo_meses ? s.plazo_meses + ' meses' : '—') + '</span></div>'
    + '<div class="detail-item"><label>Visitas/semana</label><span>' + (s.visitas_semana||'—') + '</span></div>'
    + '<div class="detail-item"><label>Carga teórica</label><span>' + (s.carga_teorica_calculada ? s.carga_teorica_calculada + '%' : '—') + '</span></div>'
    + '<div class="detail-item"><label>Prioridad</label><span>' + (s.prioridad||'—') + '</span></div>'
    + '<div class="detail-item"><label>Estado</label><span>' + s.estado + '</span></div>'
    + '<div class="detail-item"><label>Técnico asignado</label><span>' + (s.tecnico_asignado||'—') + '</span></div>'
    + '<div class="detail-item"><label>Fecha asignación</label><span>' + fechaAsig + '</span></div>'
    + '</div>'
    + (s.observaciones ? '<div style="margin-top:0.75rem;"><label style="font-size:0.72rem;color:#aaa;text-transform:uppercase;">Observaciones</label><p style="font-size:0.875rem;margin-top:4px;">' + s.observaciones + '</p></div>' : '')
    + '<div style="margin-top:1.25rem;display:flex;justify-content:flex-end;"><button class="btn" onclick="closeModal()">Cerrar</button></div>';
  document.getElementById('modalAsignar').classList.add('open');
}

function closeModal() {
  document.getElementById('modalAsignar').classList.remove('open');
  tecnicoSeleccionado = null;
  solicitudActual = null;
}

async function init() {
  await fetchAll();
  renderStats();
  renderTabla();
}

document.getElementById('modalAsignar').addEventListener('click', e => { if (e.target === document.getElementById('modalAsignar')) closeModal(); });
init();
</script>
</body>
</html>
